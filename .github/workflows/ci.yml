name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: python -m pytest -q
      - name: Validate JSON schemas parse
        run: |
          python -m json.tool schemas/decision-receipt.schema.json >/dev/null
          python -m json.tool schemas/action-request.schema.json >/dev/null

  google-adk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Google ADK integration
        run: python -m pip install -e '.[adk,dev]'
      - name: Run Google ADK integration tests
        run: python -m pytest -q tests/test_google_adk_integration.py
